# Color Scheme
color:
  primary: 2C3E50
  secondary: 7F8C8D
  accent: 2980B9
  code: 2C3E50
  code-comment: 7F8C8D
  table-header: ECf0F1
  border: DAE0E5
  page-background: FFFFFF
  block-background: F8F9FA
  note:
    primary: 2ECC71
    secondary: E9F7EF
  tip:
    primary: 3498DB
    secondary: EBFAFF
  important:
    primary: E67E22
    secondary: FDEBD0
  caution:
    primary: F1C40F
    secondary: FEF9E7
  warning:
    primary: E74C3C
    secondary: FDEDEC


# Font Configuration
font:
  catalog:
    Fira Code:
      normal: FiraCode/FiraCodeNerdFont-Regular.ttf
      bold: FiraCode/FiraCodeNerdFont-Bold.ttf
    Inter:
      normal: Inter/Inter-Regular.ttf
      bold: Inter/Inter-Bold.ttf
      italic: Inter/Inter-Italic.ttf
      bold_italic: Inter/Inter-BoldItalic.ttf
    Lato:
      normal: Lato/Lato-Regular.ttf
      bold: Lato/Lato-Bold.ttf
      italic: Lato/Lato-Italic.ttf
      bold_italic: Lato/Lato-BoldItalic.ttf


# Page Layout
page:
  size: A4
  layout: portrait
  margin: [1in, 1in, 1in, 1in]
  background_color: $color-page-background
  numbering:
    start-at: toc


# Base Styles
base:
  font-family: Lato
  font-size: 10pt
  line-height: 1.5
  font-color: 333333
  border-color: $color-border
  border-width: 0.5
  border-radius: 4


# Headings
heading:
  font-style: bold
  font-color: $color-primary
  h1:
    font-size: 22pt
  h2:
    font-size: 20pt
    margin-bottom: 6pt
    color: $color-secondary
  h3:
    font-size: 16pt
    margin-top: 10pt
    margin-bottom: 6pt
    color: $color-primary
  h4:
    font-size: 14pt
    margin-top: 8pt
  h5:
    font-size: 12pt


# Admonitions
admonition:
  border-width: $base-border-width
  border-radius: $base-border-radius
  column-rule-width: $base-border-width
  padding: [12pt, 18pt, 12pt, 18pt]

  note:
    border-color: $color-note-primary
    column-rule-color: $color-note-primary
    background-color: $color-note-secondary

  tip:
    border-color: $color-tip-primary
    column-rule-color: $color-tip-primary
    background-color: $color-tip-secondary

  important:
    border-color: $color-important-primary
    column-rule-color: $color-important-primary
    background-color: $color-important-secondary

  caution:
    border-color: $color-caution-primary
    column-rule-color: $color-caution-primary
    background-color: $color-caution-secondary

  warning:
    border-color: $color-warning-primary
    column-rule-color: $color-warning-primary
    background-color: $color-warning-secondary

  icon:
    note:
      name: fa-pencil-square-o
      stroke-color: $color-note-primary
      size: 14

    tip:
      name: fas-lightbulb
      stroke-color: $color-tip-primary
      size: 14

    important:
      name: fas-exclamation-circle
      stroke-color: $color-important-primary
      size: 14

    caution:
      name: fas-fire
      stroke-color: $color-caution-primary
      size: 14

    warning:
      name: fas-exclamation-triangle
      stroke-color: $color-warning-primary
      size: 14

  label:
      text-transform: uppercase
      font-style: bold
      note:
        border-color: $color-note-primary


# Code Blocks - used exclusively for code snippets
code:
  font-family: Fira Code
  font-size: ceil($base-font-size * 0.75)
  border-color: $color-border
  border-width: $base-border-width
  border-radius: $base-border-radius
  padding: 8pt
  line-height: $base-line-height
  line-numbers:
    font-color: 95A5A6


# Inline Code Blocks - used in text highlighting
codespan:
  font-family: $base-font-family
  font-size: $base-font-size
  background_color: $color-block-background
  border-color: $color-border
  border-width: $base-border-width
  border-offset: 2
  border-radius: 2


# Tables
table:
  border-width: $base-border-width
  border-color: $color-border
  cell:
    padding: 8pt
  head:
    background-color: $color-table-header
    font-color: $color-primary
    font-style: bold
    border-bottom-width: $base-border-width
    border-bottom-color: $color-border
  body:
    stripe-background: $color-block-background


# Links
link:
  font-color: $color-accent
  text-decoration: underline


# Table of Contents
toc:
  indent: 20pt
  line-height: $base-line-height


# Title Page
title-page:
  align: center
  title:
    font-size: 28pt
    font-color: $color-primary
    margin-bottom: 8pt
    top: 30%
  subtitle:
    font-size: 22pt
    font-color: $color-secondary
    margin-bottom: 16pt
  authors:
    font-size: 14pt
    font-color: $color-primary
    margin-bottom: 8pt
  revision:
    delimiter: '<br>'
    font-size: 12pt
    font-color: $color-secondary


# Footer
footer:
  height: 40pt
  border-color: $color-border
  recto:
    left:
      content: ''
    right:
      content: '{page-number}'
  verso:
    left:
      content: ''
    right:
      content: '{page-number}'
  title-page: false